services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-mineadmin}
      - DB_DATABASE=${DB_DATABASE:-mineadmin}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-base64}
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES:-1h}
      - JWT_REFRESH_EXPIRES=${JWT_REFRESH_EXPIRES:-2h}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-mineadmin}
      - MYSQL_DATABASE=${DB_DATABASE:-mineadmin}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
