name: mineadmin

volumes:
  mine_redis_data:
  mine_mysql_data:

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - mine_redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - TZ=Asia/Shanghai

  mysql:
    image: mysql:5.7
    volumes:
      - mine_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mineadmin
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  nest:
    build:
      context: ./server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9502:9502"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    environment:
      TZ: Asia/Shanghai
      PORT: 9502
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: mineadmin
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_CHARSET: utf8mb4
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: "true"
      DB_LOGGING: "false"
      DB_SEED: "true"
      ACCESS_TOKEN_TTL_SECONDS: 7200
      REFRESH_TOKEN_TTL_SECONDS: 604800
      UPLOAD_DIR: ../storage/uploads
      UPLOAD_PUBLIC_BASE_URL: http://127.0.0.1:9502
      UPLOAD_MAX_BYTES: 20971520
      LOG_READ_REQUESTS: "false"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9502/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
